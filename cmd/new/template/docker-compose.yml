#version: "3.8"

services:
  app_server:
    build: .
    security_opt:
      - seccomp:unconfined
    volumes:
      - .:/syntropy
    ports:
      - "1234:1234"
    stop_signal: SIGINT
    stop_grace_period: 10s
    restart: always
    healthcheck:
      test: "curl 'http://localhost:1234/'"
      interval: "30s"
      timeout: "3s"
      start_period: "5s"
      retries: 3
  console:
    build: .
    command: bundle exec syntropy console
    stdin_open: true # docker run -i
    tty: true
    security_opt:
      - seccomp:unconfined
    profiles:
      - dev
    volumes:
      - .:/syntropy
    stop_signal: SIGINT
    restart: never
  test:
    build: .
    command: bundle exec syntropy test -w
    stdin_open: true # docker run -i
    tty: true
    security_opt:
      - seccomp:unconfined
    profiles:
      - dev
    volumes:
      - .:/syntropy
    stop_signal: SIGINT
    restart: never
